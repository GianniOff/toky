<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système d'Alerte</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #111; color: white; }
        #accueil { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        iframe { width: 100%; height: 100vh; border: none; display: none; }
    </style>
</head>
<body>

    <div id="accueil">
        <h1>Initialisation...</h1>
        <p>En attente du paramètre de session.</p>
    </div>

    <iframe id="iframe-page" src="https://giannioff.github.io/loading/"></iframe>

    <script type="text/javascript">
        // --- TES INFOS À VÉRIFIER ---
        const SERVICE_ID = "service_yxxgo0k";  // EX: service_xxxxxxx
        const TEMPLATE_ID = "template_umtwpsi"; // EX: template_xxxxxxx
        const PUBLIC_KEY = "q9483jeQ2w7hlwQuJ";

        (function() {
            emailjs.init(PUBLIC_KEY);
        })();

        function executerAction() {
            const hash = window.location.hash;

            if (hash && hash.length > 1) {
                // 1. Afficher l'iframe de loading immédiatement
                document.getElementById('accueil').style.display = "none";
                document.getElementById('iframe-page').style.display = "block";

                // 2. Envoyer l'email en arrière-plan
                console.log("Envoi du signal pour : " + hash);
                
                emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                    message: "Code utilisé : " + hash,
                    to_name: "Admin"
                })
                .then(() => {
                    console.log("Email envoyé avec succès !");
                })
                .catch((error) => {
                    console.error("Erreur EmailJS détaillée :", error);
                    // Si tu vois 404 ici, c'est que SERVICE_ID ou TEMPLATE_ID est faux
                });
            }
        }

        window.onload = executerAction;
        window.onhashchange = executerAction;
    </script>
</body>
</html>
