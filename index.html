<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site GitHub</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #accueil { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; background: #1a1a1a; color: white;
        }
        iframe { width: 100%; height: 100vh; border: none; display: none; }
    </style>
</head>
<body>

    <div id="accueil">
        <h1>Bienvenue</h1>
        <p>En attente du code d'accès...</p>
    </div>

    <iframe id="iframe-page" src="https://giannioff.github.io/loading/"></iframe>

    <script type="text/javascript">
        // --- TA CONFIGURATION ---
        const PUBLIC_KEY = "TA_PUBLIC_KEY_ICI";
        const SERVICE_ID = "TON_SERVICE_ID_ICI";
        const TEMPLATE_ID = "TON_TEMPLATE_ID_ICI";

        (function() {
            emailjs.init(PUBLIC_KEY);
        })();

        function verifierAction() {
            const hash = window.location.hash;

            // Si l'URL contient quelque chose après le #
            if (hash && hash.length > 1) {
                // 1. On affiche l'iframe
                document.getElementById('accueil').style.display = "none";
                document.getElementById('iframe-page').style.display = "block";

                // 2. On envoie l'email
                emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                    message: "Le code détecté est : " + hash,
                    subject: "Nouvelle visite : " + hash
                })
                .then(() => console.log("Alerte email envoyée !"))
                .catch((err) => console.log("Erreur d'envoi :", err));
            }
        }

        // Vérification au chargement et au changement d'URL
        window.onload = verifierAction;
        window.onhashchange = verifierAction;
    </script>
</body>
</html>
